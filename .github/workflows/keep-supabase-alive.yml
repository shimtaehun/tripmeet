name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */5 * *'  # 5일마다 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://ylcelbelrkwgbiorjdhu.supabase.co/rest/v1/" \
            && echo "✅ Supabase ping 성공!" || echo "❌ Supabase ping 실패"
